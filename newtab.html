<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <style>
    html,
    body {
      background: #0f0c29;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <!-- Background Layer -->
  <div id="background" class="background">
    <video id="background-video" class="background-video" muted autoplay loop playsinline></video>
  </div>
  <div class="background-overlay"></div>

  <!-- Main Content -->
  <main class="main-layout">
    <!-- Top Right: Weather + World Clock + Calendar -->
    <section class="top-right" id="top-right-area">
      <div id="weather-widget" class="widget"></div>
      <div id="world-clock-widget" class="widget"></div>
      <div id="calendar-widget" class="widget"></div>
    </section>

    <!-- Center: Clock, Greeting, Quote + News below -->
    <section class="center-content">
      <div class="center-inner">
        <div id="clock-time" class="clock-time"></div>
        <div id="clock-date" class="clock-date"></div>
        <div id="greeting" class="greeting"></div>
        <div id="quote" class="quote"></div>
        <!-- News directly below quote, part of center flow -->
        <div id="news-widget" class="widget news-widget"></div>
      </div>
    </section>
  </main>

  <!-- Photo Credit -->
  <div id="photo-credit" class="photo-credit" style="display:none;"></div>

  <!-- Settings Toggle -->
  <button id="settings-toggle" class="settings-toggle" aria-label="Settings">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
      stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3" />
      <path
        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
    </svg>
  </button>

  <!-- Settings Overlay -->
  <div id="settings-overlay" class="settings-overlay"></div>

  <!-- Settings Panel -->
  <div id="settings-panel" class="settings-panel">
    <div class="settings-header">
      <h2>Settings</h2>
      <button class="settings-close" id="settings-close-btn" aria-label="Close settings">×</button>
    </div>
    <div class="settings-content"></div>
  </div>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/background.js"></script>
  <script src="js/clock.js"></script>
  <script src="js/quotes.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/worldclock.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/news.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
